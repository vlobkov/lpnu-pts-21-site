                        <body>
                            <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 AI Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: #e0e0e0;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

#header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

#score-display {
  font-size: 1.4em;
  font-weight: 700;
  color: #00ff88;
  text-shadow: 0 0 15px rgba(0,255,136,0.4);
}

#high-score {
  font-size: 0.9em;
  color: #888;
}

canvas {
  border: 2px solid #1a3a2a;
  border-radius: 8px;
  background: #0d1117;
  box-shadow: 0 0 40px rgba(0,255,100,0.08);
}

#controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}

.btn {
  padding: 8px 16px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #1a1a2e;
  color: #ccc;
  font-size: 0.85em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: #2a2a4e; border-color: #555; }
.btn.active { background: #0d3320; border-color: #00ff88; color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }

#speed-selector {
  display: flex;
  align-items: center;
  gap: 6px;
}
#speed-selector label { font-size: 0.8em; color: #888; }
#speed-slider {
  width: 100px;
  accent-color: #00ff88;
}

/* D-Pad */
#dpad-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 180px;
  display: none;
}

/*@media (max-width: 768px), (pointer: coarse) {
  #dpad-container { display: block; }
}*/

@media (max-width: 768px), (pointer: coarse) {
body {
    justify-content: flex-start; /* Align content to the top */
    padding-top: 20px; /* Optional: add some breathing room from very edge */
  }

  /* Reorder elements for mobile layout */
  #header { order: 2; }
  #controls { order: 1; }
  canvas { order: 3; }
  #dpad-container { order: 4; display: block; }

}



.dpad-btn {
  position: absolute;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5em;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.dpad-btn:active, .dpad-btn.pressed {
  background: rgba(0,255,136,0.15);
  border-color: rgba(0,255,136,0.4);
  color: rgba(0,255,136,0.7);
}

#dpad-up    { top: 0; left: 50%; transform: translateX(-50%); }
#dpad-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
#dpad-left  { left: 0; top: 50%; transform: translateY(-50%); }
#dpad-right { right: 0; top: 50%; transform: translateY(-50%); }

#mode-label {
  font-size: 0.75em;
  color: #666;
  margin-top: 4px;
}

#game-over-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 100;
}
#game-over-overlay.show { display: flex; }
#game-over-overlay h2 { color: #ff4466; font-size: 2em; margin-bottom: 10px; }
#game-over-overlay p { color: #aaa; margin-bottom: 20px; }

#ai-status {
  font-size: 0.75em;
  color: #ffaa00;
  min-height: 1.2em;
}
</style>
</head>
<body>

<div id="header">
  <div id="score-display">Score: 0</div>
  <div id="high-score">Best: 0</div>
  <div id="ai-status"></div>
</div>

<canvas id="game"></canvas>

<div id="controls">
  <button class="btn active" id="btn-manual" onclick="setMode('manual')">🎮 Manual</button>
  <button class="btn" id="btn-ai" onclick="setMode('ai')">🤖 AI Auto</button>
  <div id="speed-selector">
    <label>Speed:</label>
    <input type="range" id="speed-slider" min="1" max="20" value="8">
    <span id="speed-val" style="font-size:0.8em;color:#aaa;min-width:30px;">8</span>
  </div>
  <button class="btn" onclick="toggleSound()" id="btn-sound">🔊 On</button>
  <button class="btn" onclick="resetGame()">↻ Reset</button>
</div>

<div id="dpad-container">
  <div class="dpad-btn" id="dpad-up">▲</div>
  <div class="dpad-btn" id="dpad-down">▼</div>
  <div class="dpad-btn" id="dpad-left">◀</div>
  <div class="dpad-btn" id="dpad-right">▶</div>
</div>

<div id="game-over-overlay">
  <h2>Game Over</h2>
  <p id="final-score"></p>
  <button class="btn" onclick="resetGame()" style="font-size:1.1em;padding:12px 30px;">Play Again</button>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let COLS, ROWS, CELL;
function initSize() {
  const maxW = Math.min(window.innerWidth - 20, 560);
  const maxH = Math.min(window.innerHeight - 280, 560);
  const size = Math.max(300, Math.min(maxW, maxH));
  COLS = ROWS = 20;
  CELL = Math.floor(size / COLS);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
}
initSize();

// ─── AUDIO (Web Audio API) ──────────────────────
let audioCtx = null;
let soundEnabled = true;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type='square', vol=0.12) {
  if (!soundEnabled || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxEat() { playTone(660, 0.08); setTimeout(()=>playTone(880, 0.1), 50); }
function sfxDie() { playTone(200, 0.3, 'sawtooth', 0.15); setTimeout(()=>playTone(120, 0.4, 'sawtooth', 0.1), 100); }
function sfxMove() { playTone(300, 0.02, 'sine', 0.03); }

// ─── GAME STATE ──────────────────────────────────
let snake, dir, nextDir, food, score, highScore = 0;
let mode = 'manual'; // 'manual' | 'ai'
let gameRunning = false;
let gameOver = false;
let loopId = null;

function resetGame() {
  document.getElementById('game-over-overlay').classList.remove('show');
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; gameOver = false; gameRunning = true;
  placeFood();
  updateUI();
  if (loopId) cancelAnimationFrame(loopId);
  loopId = requestAnimationFrame(gameLoop);
}

function placeFood() {
  const occupied = new Set(snake.map(s => s.x+','+s.y));
  const free = [];
  for (let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) if(!occupied.has(x+','+y)) free.push({x,y});
  if (!free.length) { gameRunning=false; endGame(); return; }
  food = free[Math.floor(Math.random()*free.length)];
}

function updateUI() {
  document.getElementById('score-display').textContent = 'Score: '+score;
  document.getElementById('high-score').textContent = 'Best: '+Math.max(highScore, score);
  const spd = parseInt(document.getElementById('speed-slider').value);
  document.getElementById('speed-val').textContent = spd;
}

function endGame() {
  gameRunning = false; gameOver = true;
  if (score > highScore) highScore = score;
  sfxDie();
  document.getElementById('final-score').textContent = 'Score: '+score+' | Best: '+highScore;
  document.getElementById('game-over-overlay').classList.add('show');
}

// ─── SPEED ──────────────────────────────────────
function getInterval() {
  const spd = parseInt(document.getElementById('speed-slider').value);
  // Map 1-20 to ~400ms down to ~35ms
  return Math.max(35, 420 - spd * 20);
}

document.getElementById('speed-slider').addEventListener('input', updateUI);

// ─── MODE SWITCH ────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-manual').classList.toggle('active', m==='manual');
  document.getElementById('btn-ai').classList.toggle('active', m==='ai');
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('btn-sound').textContent = soundEnabled ? '🔊 On' : '🔇 Off';
  if (soundEnabled) ensureAudio();
}

// ─── INPUT ──────────────────────────────────────
function setDir(x, y) {
  // Prevent 180° reversal
  if (dir.x === -x && dir.y === -y) return;
  nextDir = {x, y};
}

document.addEventListener('keydown', e => {
  ensureAudio();
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': setDir(0,-1); break;
    case 'ArrowDown': case 's': case 'S': setDir(0,1); break;
    case 'ArrowLeft': case 'a': case 'A': setDir(-1,0); break;
    case 'ArrowRight': case 'd': case 'D': setDir(1,0); break;
  }
});

// D-Pad touch/mouse
['up','down','left','right'].forEach(d => {
  const el = document.getElementById('dpad-'+d);
  const dirs = {up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}};
  const handler = (e) => { e.preventDefault(); ensureAudio(); setDir(dirs[d].x, dirs[d].y); el.classList.add('pressed'); };
  el.addEventListener('touchstart', handler, {passive:false});
  el.addEventListener('mousedown', handler);
  const upHandler = () => el.classList.remove('pressed');
  el.addEventListener('touchend', upHandler);
  el.addEventListener('touchcancel', upHandler);
  el.addEventListener('mouseup', upHandler);
});

// ─── AI (BFS Pathfinding) ──────────────────────
function bfs(start, goal, obstacles) {
  const obs = new Set(obstacles.map(o=>o.x+','+o.y));
  const key = n => n.x+','+n.y;
  const visited = new Set();
  visited.add(key(start));
  const queue = [{pos:start, path:[]}];

  while (queue.length) {
    const {pos, path} = queue.shift();
    if (pos.x === goal.x && pos.y === goal.y) return path;

    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = pos.x+dx, ny = pos.y+dy;
      const nk = nx+','+ny;
      if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
      if (obs.has(nk) || visited.has(nk)) continue;
      visited.add(nk);
      queue.push({pos:{x:nx,y:ny}, path:[...path,{x:nx,y:ny}]});
    }
  }
  return null;
}

function aiDecide() {
  const head = snake[0];
  const bodyObstacles = snake.slice(1);

  // Try BFS to food
  let path = bfs(head, food, bodyObstacles);

  if (path && path.length > 0) {
    // Simulate: after eating, will we still have an escape route?
    const nextStep = path[0];
    // Check if from nextStep we can reach tail (safety check)
    const simulatedSnake = [nextStep, ...snake.slice(0,-1)];
    const simTail = simulatedSnake[simulatedSnake.length-1];
    let escapePath = bfs(nextStep, simTail, simulatedSnake.slice(1,-1));

    if (!escapePath && simulatedSnake.length > COLS*ROWS * 0.4) {
      // Snake is long and no escape after eating — try to chase tail instead
      const tailPath = bfs(head, simTail, bodyObstacles);
      if (tailPath && tailPath.length > 1) {
        path = tailPath;
      }
    }

    document.getElementById('ai-status').textContent = '🤖 Hunting food';
    return path[0];
  }

  // Fallback: chase own tail to buy time
  const tail = snake[snake.length-1];
  let tailPath = bfs(head, tail, bodyObstacles);
  if (tailPath && tailPath.length > 1) {
    document.getElementById('ai-status').textContent = '🤖 Chasing tail';
    return tailPath[0];
  }

  // Last resort: any valid neighbor
  for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
    const nx=head.x+dx, ny=head.y+dy;
    if (nx>=0&&nx<COLS&&ny>=0&&ny<ROWS && !bodyObstacles.some(o=>o.x===nx&&o.y===ny)) {
      document.getElementById('ai-status').textContent = '🤖 Surviving';
      return {x:nx, y:ny};
    }
  }

  document.getElementById('ai-status').textContent = '';
  return null; // will die
}

// ─── GAME LOOP ──────────────────────────────────
let lastTime = 0;
function gameLoop(timestamp) {
  if (!gameRunning) return;

  const interval = getInterval();
  if (timestamp - lastTime < interval) {
    loopId = requestAnimationFrame(gameLoop);
    return;
  }
  lastTime = timestamp;

  // AI decision
  if (mode === 'ai') {
    const aiMove = aiDecide();
    if (aiMove) nextDir = {x: aiMove.x - snake[0].x, y: aiMove.y - snake[0].y};
  }

  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); draw(); return; }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); draw(); return; }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score++;
    sfxEat();
    placeFood();
    updateUI();
  } else {
    snake.pop();
  }

  draw();
  loopId = requestAnimationFrame(gameLoop);
}

// ─── RENDERING ──────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  // Food glow
  const fx = food.x * CELL + CELL/2;
  const fy = food.y * CELL + CELL/2;
  const glow = ctx.createRadialGradient(fx,fy,0,fx,fy,CELL*1.5);
  glow.addColorStop(0,'rgba(255,60,80,0.3)');
  glow.addColorStop(1,'rgba(255,60,80,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(fx-CELL*1.5, fy-CELL*1.5, CELL*3, CELL*3);

  // Food
  ctx.fillStyle = '#ff3c50';
  ctx.shadowColor = '#ff3c50';
  ctx.shadowBlur = 8;
  roundRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4, 4);
  ctx.shadowBlur = 0;

  // Snake body
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const t = i / snake.length;
    if (i === 0) {
      // Head
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
      roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 5);
      ctx.shadowBlur = 0;

      // Eyes
      const ex1 = s.x*CELL + CELL*(dir.x===-1?0.25 : dir.x===1?0.65 : 0.3);
      const ey1 = s.y*CELL + CELL*(dir.y===-1?0.25 : dir.y===1?0.65 : 0.3);
      const ex2 = s.x*CELL + CELL*(dir.x===-1?0.25 : dir.x===1?0.65 : 0.7);
      const ey2 = s.y*CELL + CELL*(dir.y===-1?0.25 : dir.y===1?0.65 : 0.7);
      ctx.fillStyle = '#0a0a1a';
      ctx.beginPath(); ctx.arc(ex1,ey1,CELL*0.1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2,ey2,CELL*0.1,0,Math.PI*2); ctx.fill();
    } else {
      // Body gradient from green to teal
      const r = Math.round(0 + t * 0);
      const g = Math.round(255 - t * 140);
      const b = Math.round(136 + t * 80);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      roundRect(s.x*CELL+1.5, s.y*CELL+1.5, CELL-3, CELL-3, 4);
    }
  }

  // AI path preview (subtle)
  if (mode === 'ai' && gameRunning) {
    const head = snake[0];
    const bodyObs = snake.slice(1);
    const path = bfs(head, food, bodyObs);
    if (path) {
      ctx.strokeStyle = 'rgba(255,255,0,0.12)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(head.x*CELL+CELL/2, head.y*CELL+CELL/2);
      for (const p of path) {
        ctx.lineTo(p.x*CELL+CELL/2, p.y*CELL+CELL/2);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
}

// ─── INIT ───────────────────────────────────────
resetGame();
</script>
</body>
</html>
